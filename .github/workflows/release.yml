name: Build and Upload VSIX

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Get version and filename
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filename=${NAME}-${VERSION}.vsix" >> $GITHUB_OUTPUT

      - name: Upload via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          VSIX_FILE: ${{ steps.meta.outputs.filename }}
        run: |
          sudo apt-get install -y lftp

          NAME_BASE=$(node -p "require('./package.json').name")
          cp "$VSIX_FILE" "${NAME_BASE}-latest.vsix"
          PORT=${FTP_PORT:-22}

          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://"$FTP_SERVER":$PORT <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          mkdir -p releases
          put $VSIX_FILE -o releases/$VSIX_FILE
          put ${NAME_BASE}-latest.vsix -o releases/${NAME_BASE}-latest.vsix
          bye
          EOF
