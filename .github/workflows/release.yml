name: Build and Upload VSIX

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Get version and filename
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filename=${NAME}-${VERSION}.vsix" >> $GITHUB_OUTPUT

      - name: Upload to FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          VSIX_FILE: ${{ steps.meta.outputs.filename }}
        run: |
          curl --fail \
            --ftp-create-dirs \
            -T "$VSIX_FILE" \
            "ftp://$FTP_SERVER/releases/$VSIX_FILE" \
            --user "$FTP_USERNAME:$FTP_PASSWORD"

      - name: Upload as latest
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          VSIX_FILE: ${{ steps.meta.outputs.filename }}
          NAME: ${{ steps.meta.outputs.filename }}
        run: |
          NAME_BASE=$(node -p "require('./package.json').name")
          cp "$VSIX_FILE" "${NAME_BASE}-latest.vsix"
          curl --fail \
            --ftp-create-dirs \
            -T "${NAME_BASE}-latest.vsix" \
            "ftp://$FTP_SERVER/releases/${NAME_BASE}-latest.vsix" \
            --user "$FTP_USERNAME:$FTP_PASSWORD"
